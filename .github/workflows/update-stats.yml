name: Update README Stats

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정(UTC)에 자동 갱신
  workflow_dispatch: # 수동으로도 실행 가능

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Stats Card
        run: |
          mkdir -p profile
          curl "https://github-readme-stats-2rmc48wk4-jeongs-projects-3f3fa55e.vercel.app/api?username=kes02&show_icons=true&theme=radical&include_all_commits=true&count_private=true" \
            -o profile/stats.svg
      
      - name: Generate Top Langs Card
        run: |
          curl "https://github-readme-stats-2rmc48wk4-jeongs-projects-3f3fa55e.vercel.app/api/top-langs/?username=kes02&layout=compact&theme=radical&count_private=true" \
            -o profile/top-langs.svg

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
